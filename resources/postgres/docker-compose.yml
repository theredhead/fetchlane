services:
  db:
    build:
      context: .
      dockerfile: Dockerfile
    image: fetchlane-postgres-postgis:16
    restart: always
    environment:
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: 'password'
      POSTGRES_DB: 'northwind'
    ports:
      - '5432:5432'
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
      - ./import:/import

volumes:
  pg-data:
